<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frozen Roadmap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
:root {
    --ice-blue: #7dd3fc;
    --deep-frost: #0ea5e9;
    --snow-white: #e6f4ff;
    --glass-bg: rgba(10, 25, 47, 0.75);
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family: 'Inter', sans-serif;
    color: var(--snow-white);
    min-height: 100vh;
    background: radial-gradient(circle at center, #0b2d4d 0%, #020617 100%);
    overflow-x: hidden;
}

/* Эффект падающего снега */
.snow{position:fixed;width:100%;height:100%;pointer-events:none;z-index:0}
.snow span{position:absolute;color:#fff;animation:fall linear infinite;opacity:.6; filter: blur(1px);}
@keyframes fall{0%{transform:translateY(-10vh) rotate(0deg)}100%{transform:translateY(110vh) rotate(360deg)}}

.container{position:relative;z-index:2;max-width:1100px;margin:auto;padding:60px 20px}

h1{
    font-family: 'Cinzel', serif;
    text-align: center;
    font-size: 3rem;
    letter-spacing: 8px;
    text-shadow: 0 0 20px rgba(125, 211, 252, 0.6);
    margin-bottom: 40px;
}

/* Стили карточек */
.card{
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 30px;
    border-radius: 20px;
    margin-bottom: 30px;
    box-shadow: 0 15px 45px rgba(0,0,0,0.6);
}

.row{display:flex;flex-wrap:wrap;gap:15px;align-items:center}

input, textarea, select {
    background: rgba(2, 6, 23, 0.8);
    border: 1px solid rgba(125, 211, 252, 0.3);
    border-radius: 10px;
    padding: 12px;
    color: white;
    transition: 0.3s;
}

input:focus, textarea:focus {
    border-color: var(--ice-blue);
    box-shadow: 0 0 10px rgba(125, 211, 252, 0.4);
    outline: none;
}

button {
    background: linear-gradient(135deg, #38bdf8, #0369a1);
    border: none;
    padding: 12px 24px;
    color: white;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
}

/* Задачи */
.task {
    margin-top: 15px;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    animation: slideIn 0.5s ease-out;
}

@keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

.task-main {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(125, 211, 252, 0.2);
    border-left: 4px solid var(--ice-blue);
    padding: 20px;
    border-radius: 15px;
}

.task-sub {
    margin-left: 50px;
    background: rgba(2, 6, 23, 0.4);
    border: 1px dashed rgba(125, 211, 252, 0.3);
    padding: 15px;
    border-radius: 12px;
    position: relative;
}

.task-sub::before {
    content: "❄";
    position: absolute;
    left: -30px;
    top: 15px;
    color: var(--ice-blue);
}

.taskHeader { display: flex; justify-content: space-between; align-items: center; gap: 15px; }

.title-text { font-size: 1.1rem; font-weight: 600; color: #bae6fd; }

.status-badge {
    font-size: 0.8rem;
    padding: 4px 10px;
    border-radius: 20px;
    background: rgba(0,0,0,0.3);
}

.progressBar {
    height: 6px;
    background: #020617;
    border-radius: 10px;
    margin-top: 15px;
    overflow: hidden;
}

.progressFill {
    height: 100%;
    background: linear-gradient(90deg, #0ea5e9, #7dd3fc);
    box-shadow: 0 0 10px #7dd3fc;
}

.btn-edit { background: none; border: 1px solid #94a3b8; color: #94a3b8; padding: 5px 10px; font-size: 12px; }
.btn-delete { background: none; color: #f87171; border: 1px solid #f87171; padding: 5px 10px; font-size: 12px; margin-left: 5px;}

.mode-switch { margin-bottom: 30px; display: flex; gap: 10px; justify-content: center; }

</style>
</head>
<body>

<div class="snow" id="snow"></div>

<div class="container">
    <h1>ROADMAP</h1>

    <div class="mode-switch">
        <button onclick="setMode('list')">Список</button>
        <button onclick="setMode('map')">Карта инея</button>
    </div>

    <div class="card">
        <div class="row">
            <input id="title" placeholder="Название этапа..." style="flex: 2" />
            <select id="status">
                <option value="todo">Заморожено</option>
                <option value="progress">В таянии (Работа)</option>
                <option value="done">Реализовано</option>
            </select>
            <input type="date" id="deadline" />
        </div>
        <textarea id="desc" placeholder="Описание задачи..." style="width:100%; margin-top:15px;"></textarea>
        <button onclick="addTask()" style="margin-top:15px; width:100%;">Добавить в план</button>
    </div>

    <div id="list"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("roadmap_tasks")||"[]");
let mode = 'list';

function save(){ localStorage.setItem("roadmap_tasks", JSON.stringify(tasks)); }

function addTask(){
    let title = document.getElementById('title').value;
    let desc = document.getElementById('desc').value;
    let status = document.getElementById('status').value;
    let deadline = document.getElementById('deadline').value;

    if(!title) return;

    tasks.push({ id: Date.now(), title, desc, status, deadline, parent: null });
    save();
    render();
    document.getElementById('title').value = '';
}

function setMode(m) { mode = m; render(); }

function removeTask(id){
    tasks = tasks.filter(t => t.id !== id && t.parent !== id);
    save();
    render();
}

function editTask(id){
    let t = tasks.find(x => x.id === id);
    let n = prompt("Новое название:", t.title);
    if(n) t.title = n;
    save();
    render();
}

function dropToTask(draggedId, targetId){
    if(draggedId === targetId) return;
    let task = tasks.find(t => t.id === draggedId);
    task.parent = targetId;
    save();
    render();
}

function calculateProgress(id){
    let children = tasks.filter(t => t.parent === id);
    if(children.length === 0) return tasks.find(t => t.id === id).status === 'done' ? 100 : 0;
    let done = children.filter(c => c.status === 'done').length;
    return Math.round((done / children.length) * 100);
}

function render(){
    const list = document.getElementById('list');
    list.innerHTML = '';
    const roots = tasks.filter(t => !t.parent);

    roots.forEach(task => {
        let div = document.createElement('div');
        div.className = 'task task-main';
        div.draggable = true;
        div.ondragstart = (e) => e.dataTransfer.setData("text", task.id);
        div.ondragover = (e) => e.preventDefault();
        div.ondrop = (e) => {
            e.preventDefault();
            dropToTask(parseInt(e.dataTransfer.getData("text")), task.id);
        };

        let progress = calculateProgress(task.id);
        
        div.innerHTML = `
            <div class="taskHeader">
                <span class="title-text">${task.title}</span>
                <div>
                    <span class="status-badge">${task.status}</span>
                    <button class="btn-edit" onclick="editTask(${task.id})">✎</button>
                    <button class="btn-delete" onclick="removeTask(${task.id})">✕</button>
                </div>
            </div>
            <div style="font-size: 0.9rem; opacity: 0.7; margin-top: 10px;">${task.desc}</div>
            <div class="progressBar"><div class="progressFill" style="width: ${progress}%"></div></div>
        `;

        list.appendChild(div);

        // Рендер подзадач
        tasks.filter(t => t.parent === task.id).forEach(sub => {
            let subDiv = document.createElement('div');
            subDiv.className = 'task task-sub';
            subDiv.innerHTML = `
                <div class="taskHeader">
                    <span>${sub.title}</span>
                    <button class="btn-delete" onclick="removeTask(${sub.id})">✕</button>
                </div>
            `;
            list.appendChild(subDiv);
        });
    });
}

// Снег
let snowCont = document.getElementById('snow');
for(let i=0; i<50; i++){
    let s = document.createElement('span');
    s.innerHTML = '❄';
    s.style.left = Math.random()*100+'%';
    s.style.fontSize = (Math.random()*20+10)+'px';
    s.style.animationDuration = (Math.random()*10+5)+'s';
    s.style.animationDelay = Math.random()*5+'s';
    snowCont.appendChild(s);
}

render();
</script>
</body>
</html>
