<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Frozen Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cinzel:wght@500&display=swap" rel="stylesheet">
<style>
:root {
    --ice-blue: #7dd3fc;
    --frost-border: rgba(125, 211, 252, 0.3);
    --glass: rgba(10, 25, 47, 0.85);
}
*{box-sizing:border-box}
body{
    margin:0; font-family: 'Inter', sans-serif; color: #e6f4ff; min-height: 100vh;
    background: radial-gradient(circle at center, #0b2d4d 0%, #020617 100%);
    overflow-x: hidden;
}
.snow{position:fixed;width:100%;height:100%;pointer-events:none;z-index:0}
.snow span{position:absolute;color:#fff;animation:fall linear infinite;opacity:0.5;}
@keyframes fall{0%{transform:translateY(-10vh)}100%{transform:translateY(110vh)}}

.container{position:relative;z-index:2;max-width:1100px;margin:auto;padding:40px 20px}
h1 { font-family: 'Cinzel', serif; text-align: center; letter-spacing: 12px; font-size: 3rem; text-shadow: 0 0 20px var(--ice-blue); margin-bottom: 40px; }

.card{ background: var(--glass); backdrop-filter: blur(12px); border: 1px solid var(--frost-border); padding: 25px; border-radius: 20px; margin-bottom: 30px; }
.row{display:flex;flex-wrap:wrap;gap:15px;margin-bottom:15px}
input, textarea, select { background: rgba(0,0,0,0.5); border: 1px solid var(--frost-border); border-radius: 8px; padding: 12px; color: white; outline: none; font-family: inherit; }

.search-input { width: 100%; margin-bottom: 20px; background: rgba(125, 211, 252, 0.1); border-style: dashed; }
button { background: linear-gradient(135deg, #0ea5e9, #0369a1); border: none; padding: 12px 25px; color: white; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(14, 165, 233, 0.4); }

/* Задачи */
.task { margin-top: 15px; transition: 0.3s; position: relative; cursor: grab; }
.task:active { cursor: grabbing; }

.task-root { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--frost-border); border-left: 6px solid var(--ice-blue); padding: 20px; border-radius: 14px; }
.task-sub { margin-left: 50px; margin-top: 10px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(125, 211, 252, 0.1); padding: 12px; border-radius: 10px; }
.task-sub::before { content: "↳"; position: absolute; left: -25px; top: 12px; color: var(--ice-blue); font-size: 1.2rem; }

.taskHeader { display: flex; align-items: center; gap: 12px; }
.taskTitle { flex-grow: 1; font-weight: 600; }
.toggle-btn { cursor: pointer; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.1); border-radius: 4px; }

.progressBar { height: 6px; background: rgba(0,0,0,0.5); border-radius: 10px; margin-top: 12px; overflow: hidden; }
.progressFill { height: 100%; background: var(--ice-blue); box-shadow: 0 0 10px var(--ice-blue); transition: 0.6s; }

.drag-over { border: 2px dashed var(--ice-blue) !important; background: rgba(125, 211, 252, 0.1) !important; }

.mode-btns { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
.mode-btns button { background: rgba(255,255,255,0.05); border: 1px solid var(--frost-border); }
.mode-btns button.active { background: var(--ice-blue); color: #000; }

.mapMode { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
.mapNode { background: var(--glass); border: 1px solid var(--frost-border); padding: 20px; border-radius: 15px; }
</style>
</head>
<body>
<div class="snow" id="snow"></div>
<div class="container">
    <h1>ROADMAP</h1>
    <div class="mode-btns">
        <button id="btn-list" class="active" onclick="setMode('list')">📋 Список</button>
        <button id="btn-map" onclick="setMode('map')">🗺 Обзор</button>
    </div>
    <div id="editor-zone" class="card">
        <input type="text" id="search" class="search-input" placeholder="🔍 Поиск..." oninput="render()">
        <div class="row">
            <input id="title" placeholder="Название..." style="flex: 2" />
            <select id="status">
                <option value="todo">❄️ Заморожено</option>
                <option value="progress">🔧 В таянии</option>
                <option value="done">✅ Готово</option>
            </select>
        </div>
        <textarea id="desc" placeholder="Описание..."></textarea>
        <button onclick="addTask()" style="width: 100%; margin-top: 10px;">Добавить пункт</button>
    </div>
    <div id="content"></div>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("roadmap_tasks") || "[]");
let collapsed = JSON.parse(localStorage.getItem("roadmap_collapsed") || "{}");
let mode = 'list';
let draggedId = null;

function save() { 
    localStorage.setItem("roadmap_tasks", JSON.stringify(tasks)); 
    localStorage.setItem("roadmap_collapsed", JSON.stringify(collapsed));
}

function setMode(m) {
    mode = m;
    document.getElementById('btn-list').classList.toggle('active', m === 'list');
    document.getElementById('btn-map').classList.toggle('active', m === 'map');
    document.getElementById('editor-zone').style.display = (m === 'list' ? 'block' : 'none');
    render();
}

function addTask() {
    const title = document.getElementById('title').value;
    const desc = document.getElementById('desc').value;
    const status = document.getElementById('status').value;
    if (!title) return;
    tasks.push({ id: Date.now(), title, desc, status, parent: null });
    save(); render();
    document.getElementById('title').value = '';
    document.getElementById('desc').value = '';
}

function toggleTask(id) { collapsed[id] = !collapsed[id]; save(); render(); }
function removeTask(id) { if(confirm("Удалить?")) { tasks = tasks.filter(t => t.id !== id && t.parent !== id); save(); render(); } }
function editTask(id) {
    let t = tasks.find(x => x.id === id);
    let n = prompt("Новое название:", t.title);
    if(n) { t.title = n; save(); render(); }
}
function changeStatus(id, s) { let t = tasks.find(x => x.id === id); if(t) t.status = s; save(); render(); }

// Drag & Drop
function onDragStart(id) { draggedId = id; }
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, targetId) {
    e.preventDefault(); e.stopPropagation();
    e.currentTarget.classList.remove('drag-over');
    if (draggedId === targetId) return;
    
    let draggedTask = tasks.find(t => t.id === draggedId);
    let targetTask = tasks.find(t => t.id === targetId);
    
    // Позволяем закинуть в любой пункт, который сам не является подпунктом
    if (draggedTask && targetTask && !targetTask.parent) {
        draggedTask.parent = targetId;
        save(); render();
    }
}
// Позволяет вытащить задачу обратно в корень, если бросить на пустую область
function onDropRoot(e) {
    if (draggedId) {
        let t = tasks.find(x => x.id === draggedId);
        if(t) t.parent = null;
        draggedId = null;
        save(); render();
    }
}

function calculateProgress(parentId) {
    let children = tasks.filter(t => t.parent === parentId);
    if (!children.length) return tasks.find(t => t.id === parentId).status === 'done' ? 100 : 0;
    return Math.round((children.filter(c => c.status === 'done').length / children.length) * 100);
}

function render() {
    const container = document.getElementById('content');
    const searchVal = document.getElementById('search').value.toLowerCase();
    container.innerHTML = '';
    container.ondragover = (e) => e.preventDefault();
    container.ondrop = onDropRoot;

    if (mode === 'map') {
        container.className = 'mapMode';
        tasks.filter(t => !t.parent).forEach(root => {
            let p = calculateProgress(root.id);
            let n = document.createElement('div');
            n.className = 'mapNode';
            n.innerHTML = `<strong>${root.title}</strong><br><small>${p}%</small>
            <div class="progressBar"><div class="progressFill" style="width:${p}%"></div></div>`;
            container.appendChild(n);
        });
        return;
    }

    container.className = '';
    tasks.filter(t => !t.parent).forEach(task => {
        if (searchVal && !task.title.toLowerCase().includes(searchVal)) return;

        let children = tasks.filter(t => t.parent === task.id);
        let p = calculateProgress(task.id);
        let isCollapsed = collapsed[task.id];

        let div = document.createElement('div');
        div.className = 'task task-root';
        div.draggable = true;
        div.ondragstart = () => onDragStart(task.id);
        div.ondragover = onDragOver;
        div.ondragleave = onDragLeave;
        div.ondrop = (e) => onDrop(e, task.id);

        div.innerHTML = `
            <div class="taskHeader">
                <div class="toggle-btn" onclick="toggleTask(${task.id})">${children.length ? (isCollapsed ? '▶' : '▼') : '•'}</div>
                <div class="taskTitle">${task.title}</div>
                <div class="actions">
                    <select onchange="changeStatus(${task.id}, this.value)">
                        <option value="todo" ${task.status==='todo'?'selected':''}>❄️</option>
                        <option value="progress" ${task.status==='progress'?'selected':''}>🔧</option>
                        <option value="done" ${task.status==='done'?'selected':''}>✅</option>
                    </select>
                    <button onclick="editTask(${task.id})" style="padding:4px 8px; background:none; border:1px solid var(--frost-border)">✎</button>
                    <button onclick="removeTask(${task.id})" style="background:none; color:#fca5a5">✕</button>
                </div>
            </div>
            <div style="font-size:0.85rem; opacity:0.6; margin: 8px 0 0 35px;">${task.desc || ''}</div>
            <div class="progressBar" style="margin-left:35px"><div class="progressFill" style="width:${p}%"></div></div>
        `;
        container.appendChild(div);

        if (!isCollapsed) {
            children.forEach(sub => {
                let subDiv = document.createElement('div');
                subDiv.className = 'task task-sub';
                subDiv.draggable = true;
                subDiv.ondragstart = () => onDragStart(sub.id);
                subDiv.innerHTML = `
                    <div class="taskHeader">
                        <div class="taskTitle" style="font-size:0.9rem">${sub.title}</div>
                        <select onchange="changeStatus(${sub.id}, this.value)" style="font-size:12px; padding:2px;">
                            <option value="todo" ${sub.status==='todo'?'selected':''}>❄️</option>
                            <option value="progress" ${sub.status==='progress'?'selected':''}>🔧</option>
                            <option value="done" ${sub.status==='done'?'selected':''}>✅</option>
                        </select>
                        <button onclick="removeTask(${sub.id})" style="background:none; color:#fca5a5">✕</button>
                    </div>
                `;
                container.appendChild(subDiv);
            });
        }
    });
}

// Снег
const snow = document.getElementById('snow');
for(let i=0; i<40; i++){
    let s = document.createElement('span');
    s.innerHTML = '❄';
    s.style.left = Math.random()*100+'%';
    s.style.fontSize = (Math.random()*15+10)+'px';
    s.style.animationDuration = (Math.random()*10+5)+'s';
    s.style.animationDelay = Math.random()*5+'s';
    snow.appendChild(s);
}
render();
</script>
</body>
</html>
