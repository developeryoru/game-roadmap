<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Game Development Roadmap</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family:Inter,sans-serif;
color:#e6f4ff;
min-height:100vh;

background:linear-gradient(135deg,#020617,#0b1d35,#143a5a,#0b3b5a,#020617);
background-size:400% 400%;
animation:gradientMove 50s ease infinite;
overflow-x:hidden;
}

@keyframes gradientMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* snow background */
.snow{position:fixed;width:100%;height:100%;pointer-events:none;z-index:0}
.snow span{position:absolute;color:#bfe9ff;animation:fall linear infinite;opacity:.8}
@keyframes fall{0%{transform:translateY(-10vh)}100%{transform:translateY(110vh)}}

.container{position:relative;z-index:2;max-width:1300px;margin:auto;padding:40px 25px 80px}

h1{font-family:Cinzel,serif;letter-spacing:3px;font-weight:500;margin-bottom:10px}
.subtitle{opacity:.7;margin-bottom:25px}

.card{
background:rgba(10,25,47,.65);
backdrop-filter:blur(14px);
border:1px solid rgba(148,163,184,.2);
padding:20px;
border-radius:18px;
margin-bottom:20px;
box-shadow:0 10px 35px rgba(0,0,0,.5);
}

.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}

input,textarea,select{
background:rgba(2,6,23,.85);
border:1px solid rgba(148,163,184,.25);
border-radius:8px;
padding:8px;
color:#e6f4ff
}

textarea{width:100%;height:70px}

button{
background:linear-gradient(135deg,#67e8f9,#38bdf8,#0ea5e9);
border:none;padding:8px 14px;color:white;border-radius:8px;font-weight:600;cursor:pointer
}

.task{
margin-top:12px;padding:14px;border-radius:14px;background:rgba(2,6,23,.9);
border:1px solid rgba(148,163,184,.2);
cursor:grab
}

.task:active{cursor:grabbing}
.sub{margin-left:35px}

.taskHeader{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.taskTitle{font-weight:600;font-size:15px}
.small{font-size:12px;opacity:.75}

.statusTodo{color:#94a3b8}
.statusProgress{color:#38bdf8}
.statusDone{color:#67e8f9}

.progressBar{height:8px;background:#020617;border-radius:20px;margin-top:8px;overflow:hidden;border:1px solid rgba(148,163,184,.2)}
.progressFill{height:100%;background:linear-gradient(90deg,#67e8f9,#38bdf8,#0ea5e9)}

.toggle{cursor:pointer;font-size:14px;opacity:.7}
.deadline{font-size:12px;opacity:.75}
.search{width:260px}

.dropHint{
margin-top:6px;
font-size:11px;
opacity:.5
}

.mapMode{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;margin-top:20px
}

.mapNode{
background:rgba(2,6,23,.9);
padding:18px;border-radius:16px;border:1px solid rgba(148,163,184,.25);position:relative
}

.mapNode:after{content:"❄";position:absolute;top:-10px;right:-10px;font-size:18px;color:#7dd3fc}

.modeSwitch{margin-bottom:20px}

</style>
</head>
<body>

<div class="snow" id="snow"></div>

<div class="container">

<h1>❄ Development Roadmap</h1>
<div class="subtitle">План разработки игры</div>

<div class="modeSwitch">
<button onclick="mode='list';render()">📋 Список</button>
<button onclick="mode='map';render()">🗺 Карта разработки</button>
</div>

<div class="card">

<div class="row" style="justify-content:space-between">
<h3>Добавить задачу</h3>
<input class="search" id="search" placeholder="Поиск..." oninput="render()" />
</div>

<div class="row">
<input id="title" placeholder="Название задачи" />
<select id="status">
<option value="todo">⬜ Не начато</option>
<option value="progress">🔧 В работе</option>
<option value="done">✅ Сделано</option>
</select>
<input type="date" id="deadline" />
</div>

<br>
<textarea id="desc" placeholder="Описание (что реализовано или что нужно сделать)"></textarea>
<br><br>
<button onclick="addTask()">Добавить</button>

<div class="dropHint">Подсказка: создавай задачи отдельно, потом перетаскивай их внутрь больших пунктов.</div>

</div>

<div id="list"></div>

</div>

<script>

let tasks = JSON.parse(localStorage.getItem("roadmap_tasks")||"[]")
let collapsed = {}
let mode='list'
let dragged=null

function save(){localStorage.setItem("roadmap_tasks",JSON.stringify(tasks))}

function statusText(s){
if(s==='todo')return '⬜ Не начато'
if(s==='progress')return '🔧 В работе'
return '✅ Сделано'
}

function statusClass(s){
if(s==='todo')return 'statusTodo'
if(s==='progress')return 'statusProgress'
return 'statusDone'
}

function addTask(){

let title=document.getElementById('title').value
let desc=document.getElementById('desc').value
let status=document.getElementById('status').value
let deadline=document.getElementById('deadline').value

if(!title)return

let task={
 id:Date.now(),
 title,
 desc,
 status,
 deadline,
 parent:null
}


tasks.push(task)

save()
render()

}

function removeTask(id){

 tasks = tasks.filter(t => t.id !== id && t.parent !== id)

 save()
 render()

}

function setStatus(id,s){

 let t=tasks.find(x=>x.id===id)
 if(t) t.status=s

 save()
 render()

}

function getChildren(id){
 return tasks.filter(t=>t.parent===id)
}

function calculateProgress(task){

 let children=getChildren(task.id)

 if(children.length===0){
 return task.status==='done'?100:0
 }

 let done=0
 children.forEach(c=>{if(c.status==='done')done++})

 return Math.round((done/children.length)*100)

}

function toggle(id){
 collapsed[id]=!collapsed[id]
 render()
}

function dragStart(id){
 dragged=id
}

function dropTask(targetId){

 if(dragged===null || dragged===targetId) return

 let draggedTask = tasks.find(t=>t.id===dragged)

 if(draggedTask){
 draggedTask.parent=targetId
 }

 dragged=null

 save()
 render()

}

function render(){

 let list=document.getElementById('list')
 list.innerHTML=''

 let search=document.getElementById('search').value.toLowerCase()

 let root=tasks.filter(t=>!t.parent)

 if(mode==='map'){

 list.className='mapMode'

 root.forEach(t=>{

 let progress=calculateProgress(t)
 let children=getChildren(t.id)

 let node=document.createElement('div')
 node.className='mapNode'

 node.innerHTML=`
 <strong>${t.title}</strong>
 <div class="small">Прогресс: ${progress}%</div>
 <div class="progressBar"><div class="progressFill" style="width:${progress}%"></div></div>
 <br>
 ${children.map(c=>`<div class="small">• ${c.title}</div>`).join('')}
 `

 list.appendChild(node)

 })

 return

 }

 list.className=''

 root.forEach(t=>drawTask(t,list,0,search))

}

function drawTask(task,container,level,search){

 if(search && !task.title.toLowerCase().includes(search) && !task.desc.toLowerCase().includes(search)) return

 let children=getChildren(task.id)
 let progress=calculateProgress(task)

 let div=document.createElement('div')
 div.className='task '+(level?'sub':'')

 div.draggable=true
 div.ondragstart=()=>dragStart(task.id)
 div.ondragover=(e)=>e.preventDefault()
 div.ondrop=()=>dropTask(task.id)

 let progressHTML = children.length
 ? `<div class="small">Прогресс раздела: ${progress}%</div>
 <div class="progressBar"><div class="progressFill" style="width:${progress}%"></div></div>`
 : ''

 let deadlineHTML = task.deadline ? `<div class="deadline">📅 ${task.deadline}</div>` : ''

 let toggleBtn = children.length ? `<span class="toggle" onclick="toggle(${task.id})">${collapsed[task.id]?'▶':'▼'}</span>` : ''

 div.innerHTML=`
 <div class="taskHeader">
 ${toggleBtn}
 <div class="taskTitle">${task.title}</div>
 <div class="${statusClass(task.status)}">${statusText(task.status)}</div>

 <select onchange="setStatus(${task.id},this.value)">
 <option value="todo">⬜</option>
 <option value="progress">🔧</option>
 <option value="done">✅</option>
 </select>

 <button onclick="removeTask(${task.id})">Удалить</button>
 </div>

 <div class="small">${task.desc||''}</div>

 ${deadlineHTML}

 ${progressHTML}
 `

 container.appendChild(div)

 if(!collapsed[task.id]){
 children.forEach(c=>drawTask(c,container,level+1,search))
 }

}

/* snow generation */
let snow=document.getElementById('snow')
for(let i=0;i<40;i++){
 let s=document.createElement('span')
 s.innerHTML='❄'
 s.style.left=Math.random()*100+'%'
 s.style.fontSize=(10+Math.random()*14)+'px'
 s.style.animationDuration=(10+Math.random()*20)+'s'
 s.style.animationDelay=Math.random()*10+'s'
 snow.appendChild(s)
}

render()

</script>

</body>
</html>
