<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Game Roadmap</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:linear-gradient(130deg,#0a1a2a,#0f2e46,#0b2236,#08141f);
background-size:400% 400%;
animation:bgmove 45s ease infinite;
color:#d9f3ff;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px 80px;
}

h1{
font-weight:600;
letter-spacing:1px;
margin-bottom:25px;
}

.controls{
display:flex;
gap:10px;
margin-bottom:20px;
}

input,textarea,button{
font-family:inherit;
}

input,textarea{
background:#07131c;
border:1px solid #1e4e6a;
color:#d9f3ff;
padding:10px;
border-radius:6px;
}

textarea{width:100%;resize:vertical}

button{
background:#10384f;
border:1px solid #2a6f92;
color:#cfefff;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#16506f}

#roadmap{
margin-top:20px;
}

.task{
border-radius:8px;
padding:12px;
margin:6px 0;
background:rgba(12,32,45,0.8);
border:1px solid rgba(70,140,180,0.3);
backdrop-filter:blur(6px);
}

.task.small{
margin-left:28px;
font-size:14px;
background:rgba(8,24,36,0.85);
}

.task.large{
font-size:18px;
font-weight:600;
background:rgba(15,46,70,0.9);
border:1px solid rgba(120,200,255,0.35);
}

.task-header{
display:flex;
align-items:center;
gap:10px;
}

.task-title{
flex:1;
}

.status{
width:16px;
height:16px;
border-radius:4px;
border:1px solid #4fa3c7;
cursor:pointer;
}

.status.todo{background:#0b2231}
.status.progress{background:#1d6f94}
.status.done{background:#6dd6ff}

.task-desc{
margin-top:6px;
font-size:13px;
opacity:.8;
}

.children{
margin-top:6px;
}

.actions{
display:flex;
gap:6px;
}

.edit{
font-size:12px;
padding:4px 8px;
}

.progressbar{
height:6px;
background:#07131c;
border-radius:6px;
margin-top:6px;
overflow:hidden;
}

.progressfill{
height:100%;
background:#79e2ff;
width:0%;
}

.drag-over{
outline:2px dashed #79e2ff;
}

</style>
</head>

<body>

<div class="container">

<h1>Game Development Roadmap</h1>

<div class="controls">
<input id="title" placeholder="Название задачи" />
<button onclick="addTask()">Добавить</button>
</div>

<textarea id="desc" placeholder="Описание задачи"></textarea>

<div id="roadmap"></div>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem('roadmap')||'[]')

function save(){
localStorage.setItem('roadmap',JSON.stringify(tasks))
}

function addTask(){

let title=document.getElementById('title').value.trim()
let desc=document.getElementById('desc').value.trim()

if(!title)return

tasks.push({
id:Date.now(),
title,
desc,
status:'todo',
children:[]
})

save()
render()

}

function toggleStatus(task){

if(task.status==='todo')task.status='progress'
else if(task.status==='progress')task.status='done'
else task.status='todo'

save()
render()

}

function editTask(task){

let newTitle=prompt('Новое название',task.title)
if(newTitle!==null && newTitle.trim()!==''){

task.title=newTitle

let newDesc=prompt('Описание',task.desc||'')
if(newDesc!==null)task.desc=newDesc

save()
render()

}

}

function progress(task){

if(task.children.length===0)return task.status==='done'?100:0

let done=0

for(let c of task.children){
if(c.status==='done')done++
}

return Math.round(done/task.children.length*100)

}

let dragItem=null

function render(){

const root=document.getElementById('roadmap')
root.innerHTML=''

for(let t of tasks){
root.appendChild(drawTask(t,true))
}

}

function drawTask(task,isLarge=false){

let div=document.createElement('div')
div.className='task '+(isLarge?'large':'small')
div.draggable=true

let header=document.createElement('div')
header.className='task-header'

let status=document.createElement('div')
status.className='status '+task.status
status.onclick=()=>toggleStatus(task)

let title=document.createElement('div')
title.className='task-title'
title.textContent=task.title

let actions=document.createElement('div')
actions.className='actions'

let edit=document.createElement('button')
edit.className='edit'
edit.textContent='Edit'
edit.onclick=()=>editTask(task)

actions.appendChild(edit)

header.appendChild(status)
header.appendChild(title)
header.appendChild(actions)

let desc=document.createElement('div')
desc.className='task-desc'
desc.textContent=task.desc||''

let children=document.createElement('div')
children.className='children'

for(let c of task.children){
children.appendChild(drawTask(c,false))
}

let bar=document.createElement('div')
bar.className='progressbar'

let fill=document.createElement('div')
fill.className='progressfill'
fill.style.width=progress(task)+'%'

bar.appendChild(fill)

if(task.children.length>0)div.appendChild(bar)

div.appendChild(header)
if(task.desc)div.appendChild(desc)
div.appendChild(children)



// drag events

div.addEventListener('dragstart',()=>{dragItem=task})

div.addEventListener('dragover',e=>{
e.preventDefault()
div.classList.add('drag-over')
})

div.addEventListener('dragleave',()=>{
div.classList.remove('drag-over')
})

div.addEventListener('drop',()=>{

div.classList.remove('drag-over')

if(dragItem && dragItem!==task){

removeTask(tasks,dragItem.id)

if(!task.children)task.children=[]

task.children.push(dragItem)

save()
render()

}

})

return div

}

function removeTask(list,id){

for(let i=0;i<list.length;i++){

if(list[i].id===id){
list.splice(i,1)
return true
}

if(removeTask(list[i].children,id))return true

}

}

render()

</script>

</body>
</html>
